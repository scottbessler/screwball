[tools]
bun = "1.3.13"
node = "22.12.0"

[tasks.install]
alias = "i"
run = "bun install"

[tasks.setup]
description = "Install deps and enable the repo git hooks"
run = ["bun install", "git config core.hooksPath .githooks"]

[tasks."lint:rust"]
description = "Rust format check + clippy (warnings denied via Cargo.toml lints)"
run = ["cargo fmt --check", "cargo clippy --all-targets"]

[tasks."lint:js"]
description = "Lint the frontend with oxlint (warnings denied)"
run = "bun run lint"

[tasks.lint]
description = "Run all linters"
depends = ["lint:rust", "lint:js"]

[tasks.check]
description = "Run the same full gate as CI and the main pre-push hook"
run = [
  "cargo fmt --check",
  "cargo check --locked",
  "cargo check --release --locked",
  "cargo clippy --locked --all-targets --all-features",
  "cargo test --locked",
  "bun run lint",
]

[tasks.fix]
description = "Auto-format/fix Rust and JS"
run = ["cargo fmt", "bun run lint:fix"]
