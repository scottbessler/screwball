name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo check --locked
      - run: cargo clippy --locked --all-targets --all-features
      - run: cargo test --locked
