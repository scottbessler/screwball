name: CI

on:
  pull_request:
  workflow_call:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo check --locked
      - run: cargo check --release --locked
      - run: cargo clippy --locked --all-targets --all-features
      - run: cargo test --locked

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  snapshots:
    name: Snapshots
    runs-on: ubuntu-latest
    # Baselines are rendered in this image; keep the tag in sync with the
    # @playwright/test version in package.json so fonts match exactly.
    container: mcr.microsoft.com/playwright:v1.54.1-jammy
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y build-essential pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx playwright test
        env:
          HOME: /root
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
